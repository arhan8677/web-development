<!DOCTYPE html>
<html>

<head>
    <title>Simple Table</title>
    <link rel="stylesheet" href="../nav-style.css">
    <style>
        body {
            font-family: 'Verdana', sans-serif;
            font-family: 'Verdana', Arial, Geneva, Verdana, sans-serif;
            background-color: #f8f9ff;
            color: #333333;
        }

        .table-container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 2rem auto;
        }

        h2 {
            color: #00a8ff;
            margin-bottom: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            background: linear-gradient(135deg, #00a8ff 0%, #9c88ff 100%);
            color: #ffffff;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background-color: #f8f9ff;
        }

        tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>

<body>
    <nav class="nav-header">
        <h2 class="nav-title">📊 Experiment 8 - HTML Tables</h2>
        <div class="nav-buttons">
            <a href="../index.html" class="back-btn">← Back to Home</a>
        </div>
    </nav>

    <div class="table-container">
        <h2>Student Table</h2>

        <table border="1">
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
            <tr>
                <td>Arhan Gaiban</td>
                <td>20</td>
                <td>Kolhapur</td>
            </tr>
            <tr>
                <td>Arhan</td>
                <td>20</td>
                <td>Kolhapur</td>
            </tr>
            <tr>
                <td>sarth</td>
                <td>21</td>
                <td>Pune</td>
            </tr>
        </table>
    </div>

    <footer class="exp-footer">
        <p>&copy; 2024 Web Development Lab |
            <a href="../index.html">Home</a>
        </p>
    </footer>
</body>

</html>
