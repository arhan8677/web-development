<!DOCTYPE html>
<html>
<head>
    <title>Simple Time Table</title>
    <link rel="stylesheet" href="../nav-style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9ff;
            color: #2d3748;
        }
        .table-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 1000px;
            margin: 2rem auto;
            overflow-x: auto;
        }
        h2 {
            color: #667eea;
            margin-bottom: 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: 600;
        }
        td {
            padding: 0.8rem 1rem;
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        tr:hover {
            background-color: #f8f9ff;
        }
    </style>
</head>
<body>
    <nav class="nav-header">
        <h2 class="nav-title">📊 Experiment 8 - Time Table</h2>
        <div class="nav-buttons">
            <a href="../index.html" class="back-btn">← Back to Home</a>
        </div>
    </nav>

    <div class="table-container">
<h2>Time Table</h2>

<table border="1">

<tr>
    <th>Day</th>
    <th>9-10</th>
    <th>10-11</th>
    <th>11:15-12:15</th>
    <th>12:15-1:15</th>
    <th>2-3</th>
    <th>3-4</th>
</tr>

<tr>
    <td>Monday</td>
    <td colspan="2">Lab</td>
    <td>AOOC</td>
    <td>MDM-II</td>
    <td>DSL</td>
    <td>-</td>
</tr>

<tr>
    <td>Tuesday</td>
    <td colspan="2">Lab</td>
    <td>AT</td>
    <td>DSL</td>
    <td>WD</td>
    <td>ENV</td>
</tr>

<tr>
    <td>Wednesday</td>
    <td colspan="2">Lab</td>
    <td>AOOC</td>
    <td>MDM-II</td>
    <td>DSL</td>
    <td>ENV</td>
</tr>

<tr>
    <td>Thursday</td>
    <td colspan="2">Lab</td>
    <td>AT</td>
    <td>AT</td>
    <td>-</td>
    <td>OEC-II</td>
</tr>

<tr>
    <td>Friday</td>
    <td colspan="2">Lab</td>
    <td colspan="2">Lab</td>
    <td>TPMS</td>
    <td>OEC-II</td>
</tr>

<tr>
    <td>Saturday</td>
    <td colspan="6">LLC-PRP</td>
</tr>

</table>
    </div>

    <footer class="exp-footer">
        <p>&copy; 2024 Web Development Lab | 
            <a href="../index.html">Home</a>
        </p>
    </footer>
</body>
</html>
